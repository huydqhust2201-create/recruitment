services:

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: recruitment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d recruitment_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: quay.io/minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: quay.io/minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/recruitment-cv &&
      mc anonymous set public local/recruitment-cv
      "
    restart: "no"

  backend:
    build: ./BE
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/recruitment_db
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-changeme_replace_with_32char_secret_key}
      MINIO_URL: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: recruitment-cv
      MINIO_PUBLIC_URL: http://localhost:9000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      VNPAY_TMN_CODE: ${VNPAY_TMN_CODE:-CGPNBGEI}
      VNPAY_HASH_SECRET: ${VNPAY_HASH_SECRET:-RAOEXHYVSDDIIENYWSLDIIZTBEIYGHWT}
      VNPAY_RETURN_URL: http://localhost:3001/recruiter/subscription
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/jobs?size=1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s

  frontend:
    build:
      context: ./FE
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3001:3001"

volumes:
  postgres_data:
  minio_data:
